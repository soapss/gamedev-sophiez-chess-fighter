name = "TidEscape"
instruction = "./instruction.md"

[game]
# Controlled vocabularies — see the "Tag reference" tables in this task's README.md.
tags = ["action"]            # one or more from the game-tags list
tech-stack-tags = ["raylib", "cpp"]  # raylib/C — no dedicated tag; see the list
assets-used = ["primitives"]             # Primitives | ImportedAssets
avocado-model = "Muse Spark 1.1"         # exact Avocado model used for the gold build
harness = "Metacode"                     # harness used to build the gold solution
screenshots = ["./screenshots/screen-01.png"]
videos = ["https://pxl.cl/bhKRT"]       # upload to PixelCloud, reference the links
teaser = "https://pxl.cl/bhKRT"           # ~10 sec highlight video (PixelCloud)
commit-hash = "<hash>"                   # the single commit containing this task's work
